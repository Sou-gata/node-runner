[APP]
; REQUIRED: Specify script path. Optionally append '| Server Name | CustomLogPath' to customize the label and log output.
; If Log path is omitted, separate unique log files are automatically generated inside the logs folder.
; Examples:
; ScriptPath = D:/GBT/apk_server/index.js | APK Server | logs/apk.log
; ScriptPath = D:/GBT/another_server/app.js | Auth API
ScriptPath    = D:/GBT/apk_server/index.js | APK Server
; OPTIONAL
NodePath      = 
; true / false
EnableLogging = true
; OPTIONAL
LogFile       = logs/app.log
; Auto start with Windows
AutoStart     = false
